<!DOCTYPE html>
<html lang="en">
<head>
    <title>Styled Page</title>
    <style>
        body {
            background-color: #3498db; 
            margin: 0;
            padding: 40px;
            font-family: Arial, sans-serif;
            color: white; 
        }

        h1 {
            font-family: "Apple Chancery", "Comic Sans MS", cursive; 
            color: #000080; 
            margin-left: 20px;
            font-size: 3rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        p {
            margin-left: 20px;
            font-size: 1.2rem;
            line-height: 1.6;
            max-width: 600px;
        }

        .content-box {
            background-color: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>

    <div class="content-box">
        <h1>Heading</h1>
        <p>
            This is a paragraph. By adding a bit of padding and changing the 
            text color to white, it becomes much easier to read against a 
            dark blue background!
        </p>
    </div>

</body>
</html>
