<!DOCTYPE html>
<html lang="en">
<head>
        <title>Student Registration</title>
    <style>

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            margin: 0;
        }

        .form-container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 600px;
        }

        h2 {
            color: #1a237e;
            text-align: center;
            margin-bottom: 25px;
            border-bottom: 2px solid #e8eaf6;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 5px;
            color: #333;
        }

        input[type="text"], 
        input[type="number"], 
        select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box; 
            font-size: 14px;
        }

        .dob-group {
            display: flex;
            gap: 10px;
        }
        
        .dob-group select, .dob-group input {
            flex: 1;
        }

        .inline-group {
            display: flex;
            gap: 15px;
            align-items: center;
            padding: 5px 0;
        }

        .inline-group input {
            margin-right: 5px;
        }

        input[type="submit"] {
            background-color: #1a237e;
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.3s;
        }

        input[type="submit"]:hover {
            background-color: #0d164f;
        }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Student Registration Form</h2>
    
    <form action="success.html">
        <div class="form-group">
            <label>Full Name</label>
            <div class="dob-group">
                <input type="text" placeholder="First Name" required>
                <input type="text" placeholder="Middle Name">
                <input type="text" placeholder="Last Name" required>
            </div>
        </div>

        <div class="form-group">
            <label>Date of Birth</label>
            <div class="dob-group">
                <select aria-label="Day">
                    <option value="" disabled selected>Day</option>
                    <option>1</option><option>2</option><option>3</option><option>4</option><option>5</option>
                    <option>10</option><option>20</option><option>31</option> </select>
                <select aria-label="Month">
                    <option value="" disabled selected>Month</option>
                    <option>January</option><option>February</option><option>March</option>
                    <option>April</option><option>May</option><option>June</option>
                    <option>July</option><option>August</option><option>September</option>
                    <option>October</option><option>November</option><option>December</option>
                </select>
                <input type="number" placeholder="Year" min="1900" max="2026">
            </div>
        </div>

        <div class="form-group">
            <label>Gender</label>
            <div class="inline-group">
                <span><input type="radio" name="gender" required> Male</span>
                <span><input type="radio" name="gender"> Female</span>
            </div>
        </div>

        <div class="form-group">
            <label>Address</label>
            <input type="text" placeholder="Enter your full address">
        </div>

        <div class="form-group">
            <label>College Name</label>
            <select>
                <option>D Y Patil College of Engineering and Technology, Kasaba Bawada</option>
                <option>D Y Patil College of Engineering and Technology, Talsande</option>
                <option>D Y Patil College of Engineering and Technology, Salokhenagar</option>
            </select>
        </div>

        <div class="form-group">
            <label>Branch</label>
            <select>
                <option>Computer Science and Engineering</option>
                <option>Mechanical Engineering</option>
                <option>Chemical Engineering</option>
            </select>
        </div>

        <div class="form-group">
            <label>Technical Skills</label>
            <div class="inline-group" style="flex-wrap: wrap;">
                <span><input type="checkbox"> HTML</span>
                <span><input type="checkbox"> CSS</span>
                <span><input type="checkbox"> JavaScript</span>
                <span><input type="checkbox"> Python</span>
            </div>
        </div>

        <input type="submit" value="Register Student">
    </form>
</div>

</body>
</html>
