<!DOCTYPE html>
<html lang="en">
<head>
    <title>Scientific Formulas</title>
    <style>
        body {
            background-color: #F5F5DC; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
            margin: 0;
        }

        header {
            font-size: 2rem;
            font-weight: bold;
            color: #4e342e;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        table {
            background-color: white;
            border-collapse: collapse;
            width: 100%;
            max-width: 900px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            border-radius: 8px;
            overflow: hidden;         }

        th {
            background-color: #5d4037;
            color: white;
            padding: 15px;
            font-size: 1.2rem;
            text-align: left;
            border-bottom: 3px solid #3e2723;
        }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid #eee;
            color: #333;
            font-family: "Times New Roman", Times, serif; 
            font-size: 1.1rem;
        }
        tr:nth-child(even) {
            background-color: #fafafa;
        }
        tr:hover {
            background-color: #f1f8e9;
        }

        sub, sup {
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <header>Formula Database</header>

    <main>
        <table>
            <thead>
                <tr>
                    <th>Mathematics</th>
                    <th>Physics</th>
                    <th>Chemistry</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Addition: a + b</td>
                    <td>E = mv<sup>2</sup> / 2</td>
                    <td>PV = nRT</td>
                </tr>
                <tr>
                    <td>Subtraction: a - b</td>
                    <td>F = ma</td>
                    <td>H<sub>2</sub>O (Water)</td>
                </tr>
                <tr>
                    <td>Area of Circle: &pi;r<sup>2</sup></td>
                    <td>v<sup>2</sup> = u<sup>2</sup> + 2as</td>
                    <td>NO<sub>2</sub> (Nitrogen Dioxide)</td>
                </tr>
                <tr>
                    <td>Algebra: a<sup>2</sup> + b<sup>2</sup> = (a+b)<sup>2</sup> - 2ab</td>
                    <td>V = IR</td>
                    <td>O<sub>2</sub> (Oxygen)</td>
                </tr>
                <tr>
                    <td>Quadratic: x = [-b &plusmn; &radic;(b&sup2;-4ac)] / 2a</td>
                    <td>g = GM / r<sup>2</sup></td>
                    <td>CO<sub>2</sub> (Carbon Dioxide)</td>
                </tr>
            </tbody>
        </table>
    </main>

</body>
</html>
