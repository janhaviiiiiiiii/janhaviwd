<!DOCTYPE html>
<html lang="en">
<head>

    <title>FORMULAS</title>
    <style>
        body {
            font-family: 'Courier New', Courier, monospace; 
            background-color: #f0f2f5;
            padding-top: 50px;
            margin: 0;
        }

      
        h3 {
            color: blue;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        hr {
            border: 0;
            border-top: 2px solid #eee;
            margin-bottom: 20px;
        }

        ul {
            padding: 0;
        }

        li {
            background: #f9f9f9;
            margin: 8px 0;
            padding: 10px;
            border-radius: 5px;
            border-left: 5px solid blue;
            transition: 0.2s;
        }

        
        h5 {
            margin: 0;
            font-size: 1.2rem;
            color: blue;
        }
    </style>
</head>
<body>

    
        <h3>Formulas</h3>
        <hr>
        <ul>
            <li><h5>H<sub>2</sub>O</h5></li>
            <li><h5>NH<sub>4</sub></h5></li>
            <li><h5>CO<sub>2</sub></h5></li>
            <li><h5>MC<sup>2</sup></h5></li>
            <li><h5>l<sup>2</sup></h5></li>
            <li><h5>NO<sub>2</sub></h5></li>
            <li><h5>CH<sub>3</sub></h5></li>
            <li><h5>CH<sub>4</sub></h5></li>
            <li><h5>CH<sub>5</sub></h5></li>
            <li><h5>CCl<sub>2</sub></h5></li>
        </ul>
 

</body>
</html>
